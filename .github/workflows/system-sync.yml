name: Automated System Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1,5' # Monday and Friday at 3:00 AM UTC
  workflow_dispatch: # Allows manual trigger from UI

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run System Sync
        run: |
          # Since sqlite is local, we just run the sync manager
          # It refers to movies.db in root
          python -m backend.sync_manager

      - name: Commit and Push Changes
        run: |
          git config --global user.name "CineMatch-AI-Bot"
          git config --global user.email "actions@github.com"
          git add movies.db artifacts/
          git diff --quiet && git diff --staged --quiet || (git commit -m "System Sync: $(date +'%Y-%m-%d') [Automated]" && git push)
